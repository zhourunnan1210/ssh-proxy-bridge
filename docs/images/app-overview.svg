<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="810" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">SSH Proxy Bridge 主界面示意图</title>
  <desc id="desc">展示示例服务器、代理状态、远程目录和连接按钮，不包含真实服务器数据。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect width="1440" height="810" fill="url(#background)"/>
  <rect x="52" y="40" width="1336" height="730" rx="24" fill="#ffffff" filter="url(#shadow)"/>

  <path d="M76 40h286v730H76c-13.3 0-24-10.7-24-24V64c0-13.3 10.7-24 24-24z" fill="#172238"/>
  <rect x="84" y="82" width="66" height="66" rx="19" fill="#2f6fed"/>
  <text x="117" y="126" text-anchor="middle" font-size="36" font-weight="700" fill="#fff" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">S</text>
  <text x="171" y="107" font-size="23" font-weight="700" fill="#fff" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">SSH Proxy</text>
  <text x="171" y="136" font-size="23" fill="#a9c5ff" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">Bridge</text>

  <rect x="73" y="184" width="268" height="62" rx="13" fill="#2b3d5d"/>
  <circle cx="104" cy="215" r="5" fill="#60a5fa"/>
  <text x="129" y="223" font-size="20" font-weight="700" fill="#fff" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">服务器</text>
  <text x="100" y="300" font-size="19" fill="#d7e1f3" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">使用说明</text>

  <rect x="78" y="650" width="258" height="88" rx="15" fill="#111b2f"/>
  <text x="101" y="681" font-size="16" fill="#9fb2d0" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">本机代理</text>
  <circle cx="103" cy="712" r="7" fill="#22c55e"/>
  <text x="121" y="719" font-size="19" fill="#fff" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">127.0.0.1:7897</text>

  <text x="410" y="117" font-size="38" font-weight="700" fill="#14213d" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">我的服务器</text>
  <text x="410" y="153" font-size="18" fill="#64748b" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">建立代理通道，并直接打开远程项目</text>
  <rect x="1166" y="92" width="172" height="54" rx="14" fill="#edf3ff" stroke="#d9e4f5"/>
  <text x="1252" y="126" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a5f" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">＋ 添加服务器</text>

  <rect x="410" y="190" width="928" height="328" rx="23" fill="#fff" stroke="#dbe5f1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="449" y="229" width="430" height="54" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="474" y="264" font-size="21" font-weight="700" fill="#172238" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">示例开发服务器（当前连接）</text>
  <rect x="1162" y="229" width="132" height="48" rx="24" fill="#dcfce7"/>
  <circle cx="1186" cy="253" r="7" fill="#22c55e"/>
  <text x="1242" y="260" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">已连接</text>

  <text x="449" y="323" font-size="18" fill="#64748b" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">developer@203.0.113.10:22 · SSH 别名 demo-server</text>
  <rect x="449" y="351" width="845" height="58" rx="13" fill="#f8fafc"/>
  <text x="472" y="387" font-size="17" fill="#7c8ca5" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">远程目录</text>
  <text x="580" y="388" font-size="20" font-weight="600" fill="#25324a" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">/workspace/my-project</text>

  <rect x="708" y="440" width="126" height="48" rx="13" fill="#f6f8fb" stroke="#dce4ee"/>
  <text x="771" y="470" text-anchor="middle" font-size="17" fill="#475569" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">运行诊断</text>
  <rect x="849" y="440" width="126" height="48" rx="13" fill="#f6f8fb" stroke="#dce4ee"/>
  <text x="912" y="470" text-anchor="middle" font-size="17" fill="#475569" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">刷新状态</text>
  <rect x="990" y="440" width="126" height="48" rx="13" fill="#f6f8fb" stroke="#dce4ee"/>
  <text x="1053" y="470" text-anchor="middle" font-size="17" fill="#475569" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">停止连接</text>
  <rect x="1131" y="440" width="163" height="48" rx="13" fill="#2f6fed"/>
  <text x="1212" y="470" text-anchor="middle" font-size="17" font-weight="700" fill="#fff" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">打开 VS Code</text>

  <text x="410" y="570" font-size="20" font-weight="700" fill="#14213d" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">运行信息</text>
  <text x="1220" y="570" font-size="16" fill="#64748b" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">刚刚检查</text>
  <rect x="410" y="594" width="928" height="118" rx="17" fill="#101a2d"/>
  <circle cx="444" cy="628" r="6" fill="#22c55e"/>
  <text x="463" y="635" font-size="17" fill="#dbeafe" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">本机代理正常，SSH 隧道正在运行。</text>
  <circle cx="444" cy="670" r="6" fill="#22c55e"/>
  <text x="463" y="677" font-size="17" fill="#dbeafe" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">服务器已通过 Windows 代理连接网络，可以开始远程开发。</text>
</svg>
