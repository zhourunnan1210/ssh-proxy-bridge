<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="440" viewBox="0 0 1440 440" role="img" aria-labelledby="title desc">
  <title id="title">SSH Proxy Bridge 工作原理</title>
  <desc id="desc">Windows 代理通过 SSH Proxy Bridge 和加密 SSH 隧道提供给远程服务器上的 VS Code 与 Codex。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1f6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e293b" flood-opacity=".10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#7090c8"/>
    </marker>
  </defs>

  <rect width="1440" height="440" rx="28" fill="url(#bg)"/>
  <text x="720" y="58" text-anchor="middle" font-size="29" font-weight="700" fill="#14213d" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">Windows 有代理，远程服务器也能用</text>
  <text x="720" y="91" text-anchor="middle" font-size="17" fill="#64748b" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">所有传输都经过现有的 SSH 加密连接</text>

  <g filter="url(#cardShadow)">
    <rect x="72" y="132" width="260" height="220" rx="22" fill="#fff" stroke="#d8e4f2"/>
    <rect x="393" y="132" width="260" height="220" rx="22" fill="#fff" stroke="#d8e4f2"/>
    <rect x="786" y="132" width="260" height="220" rx="22" fill="#fff" stroke="#d8e4f2"/>
    <rect x="1107" y="132" width="260" height="220" rx="22" fill="#fff" stroke="#d8e4f2"/>
  </g>

  <circle cx="202" cy="205" r="39" fill="#e8f0ff"/>
  <path d="M180 205h44M202 183v44" stroke="#2f6fed" stroke-width="6" stroke-linecap="round"/>
  <text x="202" y="280" text-anchor="middle" font-size="21" font-weight="700" fill="#172238" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">Windows 代理</text>
  <text x="202" y="310" text-anchor="middle" font-size="16" fill="#64748b" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">例如 127.0.0.1:7897</text>

  <rect x="484" y="166" width="78" height="78" rx="22" fill="#2f6fed"/>
  <text x="523" y="218" text-anchor="middle" font-size="39" font-weight="700" fill="#fff" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">S</text>
  <text x="523" y="280" text-anchor="middle" font-size="21" font-weight="700" fill="#172238" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">SSH Proxy Bridge</text>
  <text x="523" y="310" text-anchor="middle" font-size="16" fill="#64748b" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">自动建立和管理连接</text>

  <circle cx="916" cy="205" r="39" fill="#e8f0ff"/>
  <path d="M894 209c6-25 38-25 44 0M902 209v21h28v-21" fill="none" stroke="#2f6fed" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="916" y="280" text-anchor="middle" font-size="21" font-weight="700" fill="#172238" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">SSH 加密隧道</text>
  <text x="916" y="310" text-anchor="middle" font-size="16" fill="#64748b" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">不额外开放公网端口</text>

  <rect x="1202" y="169" width="70" height="70" rx="13" fill="#e9f8ef"/>
  <path d="M1218 188h38M1218 203h38M1218 218h25" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
  <text x="1237" y="280" text-anchor="middle" font-size="21" font-weight="700" fill="#172238" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">远程 VS Code</text>
  <text x="1237" y="310" text-anchor="middle" font-size="16" fill="#64748b" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">Codex 与远程命令行</text>

  <path d="M342 242h39" stroke="#7090c8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M663 242h101" stroke="#7090c8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1056 242h39" stroke="#7090c8" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="674" y="219" width="101" height="45" rx="22" fill="#dbeafe"/>
  <text x="724" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">SSH</text>

  <text x="720" y="400" text-anchor="middle" font-size="17" fill="#475569" font-family="Microsoft YaHei UI,Segoe UI,sans-serif">服务器侧代理默认仅绑定 127.0.0.1，不向外部网络公开</text>
</svg>
